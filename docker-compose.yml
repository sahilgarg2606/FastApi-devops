version: '3.9'
services:
   app: 
      build: .
      container_name: fastapi-app
      ports:
        - "8000:8000"
      env_file:
        - .env
      depends_on:
        - postgres
        - redis
   postgres:
      image: postgres:16
      container_name: postgres
      restart: always
      environment:
         POSTGRES_DB: appdb
         POSTGRES_USER: admin
         POSTGRES_PASSWORD: admin123
      volumes:
       - postgres_data:/var/lib/postgresql/data
