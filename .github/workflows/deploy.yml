name: Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose Down
        run: docker compose down

      - name: Build Containers
        run: docker compose build

      - name: Start Containers
        run: docker compose up -d