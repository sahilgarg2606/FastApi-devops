name: DevSecOps End to End pipeline

on: 
    push:
        branches:
            - main

jobs:
    code-quality:
        uses: ./.github/workflows/code-quality.yml
    
    secrets-scan:
        uses: ./.github/workflows/secret-scan.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
        uses: ./.github/workflows/docker-lint.yml

    trivy:
        needs: [code-quality, secrets-scan, dependency-scan , docker-scan]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit
    build-push:
        needs: [trivy]
        uses: ./.github/workflows/build-push.yml
        secrets: inherit
    deploy:
        needs: [build-push]
        uses: ./.github/workflows/deploy.yml
        secrets: inherit
    