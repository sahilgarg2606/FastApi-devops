name: DevSecOps End to End pipeline

on: 
    push:
        branches:
            - main

jobs:
    secrets-scan:
        uses: ./.github/workflows/secret-scan.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scan:
        uses: ./.github/workflows/docker-lint.yml

    build-push:
        needs: [secrets-scan, dependency-scan , docker-scan]
        uses: ./.github/workflows/build-push.yml
        secrets: inherit
    deploy:
        needs: [build-push]
        uses: ./.github/workflows/deploy.yml
        secrets: inherit
    