name: Build and Push Docker Image

on:
  workflow_call:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t fastapi:${{ github.sha }} .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
      - name: Tag Image
        run: |
          docker tag fastapi:${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/fastapi:latest
          docker tag fastapi:${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/fastapi:${{ github.ref_name }}
          docker tag fastapi:${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/fastapi:${{ github.sha }}

      - name: Push Image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/fastapi:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/fastapi:${{ github.ref_name }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/fastapi:${{ github.sha }}